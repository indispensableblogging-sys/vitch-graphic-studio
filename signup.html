<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Account | Vitch Graphic Studio</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="header">

<div class="container">

<a href="index.html" class="logo">
VITCH GRAPHIC STUDIO
</a>

</div>

</header>

<section class="hero">

<div class="container">

<h2>Create Your Account</h2>

<p>
Join Vitch Graphic Studio to book services, track projects, upload files and manage your orders.
</p>

<form class="signup-form">

<label>Full Name</label>
<input type="text" placeholder="Enter your full name" required>

<label>Email Address</label>
<input type="email" placeholder="Enter your email" required>

<label>Phone Number</label>
<input type="tel" placeholder="Enter your phone number" required>

<label>Country</label>

<select required>
<option value="">Select your country</option>

<option>Nigeria</option>
<option>Sierra Leone</option>
<option>Ghana</option>
<option>United States</option>
<option>United Kingdom</option>
<option>Canada</option>
<option>South Africa</option>
<option>Kenya</option>
<option>France</option>
<option>Germany</option>
<option>India</option>
<option>China</option>
<option>Brazil</option>
<option>Australia</option>

  </select>
  <label>City</label>

<input type="text" placeholder="Enter your city">

<label>Password</label>

<input type="password" placeholder="Create a password" required>

<label>Confirm Password</label>

<input type="password" placeholder="Confirm your password" required>

<div class="terms">

<input type="checkbox" id="terms" required>

<label for="terms">
I agree to the Terms & Conditions and Privacy Policy.
</label>

</div>

<button type="submit" class="btn">
Create Account
</button>

<p class="login-link">

Already have an account?

<a href="login.html">Login</a>

</p>

</form>

</div>

</section>

<footer>

<div class="container">

<p>© 2026 Vitch Graphic Studio. All Rights Reserved.</p>

</div>

</footer>

<script src="script.js"></script>

</body>

</html>
