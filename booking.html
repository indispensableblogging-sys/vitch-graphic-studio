<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Book a Service | Vitch Graphic Studio</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="header">

<div class="container">

<a href="index.html" class="logo">
VITCH GRAPHIC STUDIO
</a>

</div>

</header>

<section class="hero">

<div class="container">

<h2>Book a Service</h2>

<p>
Tell us about your project and we'll get back to you.
</p>

<form class="signup-form">

<label>Select Service</label>

<select required>

<option value="">Choose a service</option>

<option>Graphic Design</option>
<option>Photography</option>
<option>Videography</option>
<option>Branding & Printing</option>
<option>Website Development</option>
<option>Mobile App Development</option>
<option>Digital Marketing</option>

</select>

<label>Project Title</label>

<input type="text" placeholder="Enter your project title" required>

<label>Project Description</label>

<textarea placeholder="Describe your project..." rows="6" required></textarea>
<label>Estimated Budget</label>

<input type="number" placeholder="Enter your budget">

<label>Preferred Deadline</label>

<input type="date">

<label>Email Address</label>

<input type="email" placeholder="Enter your email" required>

<label>Phone Number</label>

<input type="tel" placeholder="Enter your phone number">

<button type="submit" class="btn">
Submit Booking
</button>

<p class="login-link">

<a href="index.html">← Back to Home</a>

</p>

</form>

</div>

</section>

<footer>

<div class="container">

<p>© 2026 Vitch Graphic Studio. All Rights Reserved.</p>

</div>

</footer>

<script src="script.js"></script>

</body>

  </html>
